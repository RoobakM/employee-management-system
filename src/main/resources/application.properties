# ===================================================================
# Server
# ===================================================================
server.port=8080

# ===================================================================
# MySQL Datasource
# Update username/password to match your local MySQL installation.
# createDatabaseIfNotExist=true means you don't have to manually
# create the schema first -- MySQL will create it on first connection.
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/employee_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Richie@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# JPA / Hibernate
# ddl-auto=update -> Hibernate creates/updates tables automatically
# based on the entity classes. Good for dev; use migrations (Flyway/
mvn -version# Liquibase) instead in a real production system.
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===================================================================
# Jackson - return dates as plain ISO strings instead of arrays
# ===================================================================
spring.jackson.serialization.write-dates-as-timestamps=false
