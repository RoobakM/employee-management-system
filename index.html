<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120"><path d="M0,64 Q300,120 600,64 T1200,64 L1200,0 L0,0 Z" fill="rgba(255,255,255,0.1)"/></svg>');
            background-size: cover;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: -1px;
            position: relative;
            z-index: 1;
        }

        header p {
            opacity: 0.95;
            font-size: 1.1em;
            font-weight: 300;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 1;
        }

        .content {
            padding: 35px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align-items: center;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="number"],
        input[type="date"],
        select {
            padding: 12px 16px;
            border: 2px solid #e8eef5;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s;
            background: #f8fafb;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        input[type="number"]:focus,
        input[type="date"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
        }

        .btn-danger:hover {
            background: #ff5252;
        }

        .btn-edit {
            background: #4ecdc4;
            color: white;
            padding: 8px 15px;
            font-size: 0.9em;
        }

        .btn-edit:hover {
            background: #45b8b0;
        }

        .search-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-section input {
            flex: 1;
            min-width: 200px;
        }

        .table-wrapper {
            overflow-x: auto;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(180deg, #f8fafb 0%, #f0f3f7 100%);
            border-bottom: 3px solid #667eea;
        }

        th {
            padding: 16px;
            text-align: left;
            font-weight: 700;
            color: #495057;
            font-size: 0.95em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid #e8eef5;
            font-size: 0.95em;
        }

        tbody tr {
            transition: all 0.2s;
        }

        tbody tr:hover {
            background: #f8fafb;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* Modal Styles - IMPROVED */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.3s;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: white;
            padding: 0;
            border-radius: 16px;
            width: 95%;
            max-width: 480px;
            max-height: 90vh;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s;
            display: flex;
            flex-direction: column;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px;
            border-bottom: none;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.5em;
            font-weight: 700;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: white;
            border-radius: 8px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .modal-body {
            padding: 24px;
            overflow-y: auto;
            flex: 1;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #333;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            font-size: 0.95em;
            padding: 11px 14px;
            background: #f8fafb;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            padding: 16px 24px;
            background: #f8fafb;
            border-top: 1px solid #e8eef5;
        }

        .modal-footer .btn {
            padding: 10px 20px;
            font-size: 0.85em;
        }

        /* Alert Styles */
        .alert {
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 20px;
            animation: slideIn 0.3s;
            border-left: 4px solid;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border-left-color: #28a745;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border-left-color: #dc3545;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border-left-color: #17a2b8;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #667eea;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-data {
            color: #999;
            text-align: center;
            padding: 20px;
        }

        .pagination-controls {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8fafb;
            border-radius: 10px;
        }

        .pagination-controls label {
            font-weight: 600;
            color: #495057;
        }

        .pagination-controls select {
            padding: 8px 12px;
            border: 2px solid #e8eef5;
            border-radius: 8px;
        }

        #pageInfo {
            color: #666;
            font-weight: 600;
        }

        #paginationButtons {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .pagination-btn {
            padding: 8px 12px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 0.9em;
        }

        .pagination-btn:hover {
            background: #667eea;
            color: white;
        }

        .pagination-btn.active {
            background: #667eea;
            color: white;
        }

        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Pagination Button Styles */
        .pagination-btn {
            padding: 8px 12px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .pagination-btn:hover {
            background: #667eea;
            color: white;
        }

        .pagination-btn.active {
            background: #667eea;
            color: white;
        }

        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .sort-indicator {
            font-size: 0.8em;
            margin-left: 5px;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.2);
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(102, 126, 234, 0.3);
        }

        .stat-card.alt1 {
            background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
        }

        .stat-card.alt2 {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .stat-card.alt3 {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .stat-unit {
            font-size: 0.85em;
            opacity: 0.85;
        }

        .department-stats {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }

        .department-stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            font-size: 0.95em;
        }

        .department-stat-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            margin-top: 4px;
            overflow: hidden;
        }

        .department-stat-fill {
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 3px;
            transition: width 0.3s;
        }
            header h1 {
                font-size: 1.8em;
            }

            .controls {
                flex-direction: column;
            }

            .controls input,
            .controls button {
                width: 100%;
            }

            .search-section {
                flex-direction: column;
            }

            .search-section input {
                min-width: unset;
            }

            table {
                font-size: 0.9em;
            }

            th, td {
                padding: 10px;
            }

            .actions {
                flex-direction: column;
            }

            .actions button {
                width: 100%;
            }
        
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>👥 Employee Management System</h1>
            <p>Manage your workforce with ease</p>
        </header>

        <div class="content">
            <!-- Alerts -->
            <div id="alertContainer"></div>

            <!-- Statistics Dashboard -->
            <div class="stats-container" id="statsContainer"></div>

            <!-- Controls -->
            <div class="controls">
                <button class="btn btn-primary" onclick="openAddModal()">+ Add Employee</button>
                <div class="search-section">
                    <input type="text" id="searchInput" placeholder="Search by name..." onkeyup="searchEmployees()">
                    <button class="btn btn-secondary" onclick="clearSearch()">Clear</button>
                </div>
            </div>

            <!-- Pagination Controls -->
            <div class="pagination-controls" style="margin-bottom: 20px; display: flex; gap: 20px; align-items: center; flex-wrap: wrap;">
                <div>
                    <label>Rows per page:</label>
                    <select id="rowsPerPageSelect" onchange="changeRowsPerPage()" style="margin-left: 10px;">
                        <option value="10">10</option>
                        <option value="25">25</option>
                        <option value="50">50</option>
                    </select>
                </div>
                <div id="pageInfo" style="color: #666; font-weight: 600;"></div>
                <div id="paginationButtons" style="display: flex; gap: 5px;"></div>
            </div>

            <!-- Employees Table -->
            <div class="table-wrapper">
                <div id="loadingContainer" class="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p>Loading employees...</p>
                </div>
                <table id="employeesTable" style="display: none;">
                    <thead>
                        <tr>
                            <th onclick="sortTable('id')" style="cursor: pointer; user-select: none;">ID <span id="sort-id"></span></th>
                            <th onclick="sortTable('name')" style="cursor: pointer; user-select: none;">Name <span id="sort-name"></span></th>
                            <th onclick="sortTable('email')" style="cursor: pointer; user-select: none;">Email <span id="sort-email"></span></th>
                            <th onclick="sortTable('department')" style="cursor: pointer; user-select: none;">Department <span id="sort-department"></span></th>
                            <th onclick="sortTable('designation')" style="cursor: pointer; user-select: none;">Designation <span id="sort-designation"></span></th>
                            <th onclick="sortTable('salary')" style="cursor: pointer; user-select: none;">Salary <span id="sort-salary"></span></th>
                            <th onclick="sortTable('dateOfJoining')" style="cursor: pointer; user-select: none;">Date of Joining <span id="sort-dateOfJoining"></span></th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="employeesBody">
                    </tbody>
                </table>
                <div id="emptyState" class="empty-state" style="display: none;">
                    <p>No employees found</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div id="employeeModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add Employee</h2>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <form id="employeeForm" onsubmit="saveEmployee(event)">
                    <div class="form-group">
                        <label for="firstName">First Name *</label>
                        <input type="text" id="firstName" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name *</label>
                        <input type="text" id="lastName" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label for="phoneNumber">Phone Number</label>
                        <input type="tel" id="phoneNumber" placeholder="e.g., 9876543210">
                    </div>
                    <div class="form-group">
                        <label for="department">Department *</label>
                        <input type="text" id="department" required>
                    </div>
                    <div class="form-group">
                        <label for="designation">Designation *</label>
                        <input type="text" id="designation" required>
                    </div>
                    <div class="form-group">
                        <label for="salary">Salary *</label>
                        <input type="number" id="salary" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label for="dateOfJoining">Date of Joining *</label>
                        <input type="date" id="dateOfJoining" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button type="submit" class="btn btn-primary" form="employeeForm">Save Employee</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Confirm Delete</h2>
                <button class="close-btn" onclick="closeDeleteModal()">×</button>
            </div>
            <p id="deleteMessage" style="margin-bottom: 20px;"></p>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeDeleteModal()">Cancel</button>
                <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://employee-management-system-production-b757.up.railway.app/api/v1/employees';
        let employees = [];
        let filteredEmployees = [];
        let currentEditId = null;
        let deleteTargetId = null;
        let currentPage = 1;
        let rowsPerPage = 10;
        let sortColumn = null;
        let sortDirection = 'asc'; // 'asc' or 'desc'

        // Load employees on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadEmployees();
        });

        // Load all employees
        async function loadEmployees() {
            showLoading(true);
            try {
                const response = await fetch(API_URL);
                const result = await response.json();
                
                if (result.success) {
                    employees = result.data || [];
                    filteredEmployees = [...employees];
                    currentPage = 1;
                    renderTable();
                    showLoading(false);
                } else {
                    showAlert('Error loading employees', 'error');
                    showLoading(false);
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('Failed to connect to server. Is it running on port 8080?', 'error');
                showLoading(false);
            }
        }

        // Sort table
        function sortTable(column) {
            // If clicking the same column, toggle direction; otherwise, set to asc
            if (sortColumn === column) {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = column;
                sortDirection = 'asc';
            }

            // Clear all sort indicators
            document.querySelectorAll('[id^="sort-"]').forEach(el => el.textContent = '');

            // Sort the filtered employees
            filteredEmployees.sort((a, b) => {
                let aVal, bVal;

                if (column === 'name') {
                    aVal = (a.firstName + ' ' + a.lastName).toLowerCase();
                    bVal = (b.firstName + ' ' + b.lastName).toLowerCase();
                } else if (column === 'id') {
                    aVal = a.id;
                    bVal = b.id;
                } else if (column === 'email') {
                    aVal = a.email.toLowerCase();
                    bVal = b.email.toLowerCase();
                } else if (column === 'department') {
                    aVal = a.department.toLowerCase();
                    bVal = b.department.toLowerCase();
                } else if (column === 'designation') {
                    aVal = a.designation.toLowerCase();
                    bVal = b.designation.toLowerCase();
                } else if (column === 'salary') {
                    aVal = a.salary;
                    bVal = b.salary;
                } else if (column === 'dateOfJoining') {
                    aVal = new Date(a.dateOfJoining);
                    bVal = new Date(b.dateOfJoining);
                }

                if (typeof aVal === 'string') {
                    return sortDirection === 'asc' ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
                } else {
                    return sortDirection === 'asc' ? aVal - bVal : bVal - aVal;
                }
            });

            // Add sort indicator
            const indicator = sortDirection === 'asc' ? '▲' : '▼';
            const sortEl = document.getElementById(`sort-${column}`);
            if (sortEl) {
                sortEl.textContent = `<span class="sort-indicator">${indicator}</span>`;
                sortEl.innerHTML = `<span class="sort-indicator" style="color: #667eea;">${indicator}</span>`;
            }

            currentPage = 1;
            renderTable();
        }

        // Render employees table with pagination
        function renderTable() {
            const table = document.getElementById('employeesTable');
            const emptyState = document.getElementById('emptyState');
            const tbody = document.getElementById('employeesBody');

            // Calculate and display statistics
            calculateStats(filteredEmployees);

            if (filteredEmployees.length === 0) {
                table.style.display = 'none';
                emptyState.style.display = 'block';
                document.querySelector('.pagination-controls').style.display = 'none';
                return;
            }

            table.style.display = 'table';
            emptyState.style.display = 'none';
            document.querySelector('.pagination-controls').style.display = 'flex';

            // Calculate pagination
            const totalPages = Math.ceil(filteredEmployees.length / rowsPerPage);
            const startIdx = (currentPage - 1) * rowsPerPage;
            const endIdx = startIdx + rowsPerPage;
            const pageData = filteredEmployees.slice(startIdx, endIdx);

            // Clear tbody
            tbody.innerHTML = '';

            // Add rows
            pageData.forEach(emp => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${emp.id}</td>
                    <td>${emp.firstName} ${emp.lastName}</td>
                    <td>${emp.email}</td>
                    <td>${emp.department}</td>
                    <td>${emp.designation}</td>
                    <td>₹${parseFloat(emp.salary).toLocaleString('en-IN', {maximumFractionDigits: 0})}</td>
                    <td>${emp.dateOfJoining}</td>
                    <td>
                        <div class="actions">
                            <button class="btn btn-edit" onclick="openEditModal(${emp.id})">Edit</button>
                            <button class="btn btn-danger" onclick="openDeleteModal(${emp.id}, '${emp.firstName} ${emp.lastName}')">Delete</button>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });

            // Update page info
            document.getElementById('pageInfo').textContent = 
                `Page ${currentPage} of ${totalPages} (${filteredEmployees.length} total)`;

            // Update pagination buttons
            renderPaginationButtons(totalPages);
        }

        // Render pagination buttons
        function renderPaginationButtons(totalPages) {
            const container = document.getElementById('paginationButtons');
            container.innerHTML = '';

            // Previous button
            const prevBtn = document.createElement('button');
            prevBtn.className = 'pagination-btn';
            prevBtn.textContent = '← Previous';
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => {
                if (currentPage > 1) {
                    currentPage--;
                    renderTable();
                }
            };
            container.appendChild(prevBtn);

            // Page number buttons
            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.className = `pagination-btn ${i === currentPage ? 'active' : ''}`;
                btn.textContent = i;
                btn.onclick = () => {
                    currentPage = i;
                    renderTable();
                };
                container.appendChild(btn);
            }

            // Next button
            const nextBtn = document.createElement('button');
            nextBtn.className = 'pagination-btn';
            nextBtn.textContent = 'Next →';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.onclick = () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    renderTable();
                }
            };
            container.appendChild(nextBtn);
        }

        // Change rows per page
        function changeRowsPerPage() {
            rowsPerPage = parseInt(document.getElementById('rowsPerPageSelect').value);
            currentPage = 1;
            renderTable();
        }

        // Search employees
        function searchEmployees() {
            const query = document.getElementById('searchInput').value.trim();
            if (query === '') {
                filteredEmployees = [...employees];
            } else {
                filteredEmployees = employees.filter(emp =>
                    emp.firstName.toLowerCase().includes(query.toLowerCase()) ||
                    emp.lastName.toLowerCase().includes(query.toLowerCase())
                );
            }
            currentPage = 1;
            renderTable();
        }

        // Clear search
        function clearSearch() {
            document.getElementById('searchInput').value = '';
            filteredEmployees = [...employees];
            currentPage = 1;
            renderTable();
        }

        // Open add modal
        function openAddModal() {
            currentEditId = null;
            document.getElementById('modalTitle').textContent = 'Add Employee';
            document.getElementById('employeeForm').reset();
            document.getElementById('employeeModal').classList.add('active');
        }

        // Open edit modal
        async function openEditModal(id) {
            const emp = employees.find(e => e.id === id);
            if (!emp) return;

            currentEditId = id;
            document.getElementById('modalTitle').textContent = 'Edit Employee';
            document.getElementById('firstName').value = emp.firstName;
            document.getElementById('lastName').value = emp.lastName;
            document.getElementById('email').value = emp.email;
            document.getElementById('phoneNumber').value = emp.phoneNumber || '';
            document.getElementById('department').value = emp.department;
            document.getElementById('designation').value = emp.designation;
            document.getElementById('salary').value = emp.salary;
            document.getElementById('dateOfJoining').value = emp.dateOfJoining;
            document.getElementById('employeeModal').classList.add('active');
        }

        // Close modal
        function closeModal() {
            document.getElementById('employeeModal').classList.remove('active');
            currentEditId = null;
        }

        // Save employee
        function submitForm() {
            document.getElementById('employeeForm').dispatchEvent(new Event('submit'));
        }

        async function saveEmployee(event) {

        // Open delete confirmation modal
        function openDeleteModal(id, name) {
            deleteTargetId = id;
            document.getElementById('deleteMessage').textContent = `Are you sure you want to delete ${name}? This action cannot be undone.`;
            document.getElementById('deleteModal').classList.add('active');
        }

        // Close delete modal
        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.remove('active');
            deleteTargetId = null;
        }

        // Confirm delete
        async function confirmDelete() {
            if (deleteTargetId === null) return;

            try {
                const response = await fetch(`${API_URL}/${deleteTargetId}`, {
                    method: 'DELETE'
                });

                const result = await response.json();

                if (result.success) {
                    showAlert(result.message, 'success');
                    closeDeleteModal();
                    loadEmployees();
                } else {
                    showAlert(result.message, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert('Error deleting employee', 'error');
            }
        }

        // Show alert
        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            container.appendChild(alert);

            setTimeout(() => {
                alert.remove();
            }, 4000);
        }

        // Show/hide loading
        function showLoading(show) {
            document.getElementById('loadingContainer').style.display = show ? 'block' : 'none';
            document.getElementById('employeesTable').style.display = show ? 'none' : 'table';
            document.getElementById('emptyState').style.display = 'none';
        }

        // Close modal on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
                closeDeleteModal();
            }
        });

        // Close modal on outside click
        document.addEventListener('click', (e) => {
            const modal = document.getElementById('employeeModal');
            const deleteModal = document.getElementById('deleteModal');
            
            if (e.target === modal) closeModal();
            if (e.target === deleteModal) closeDeleteModal();
        });
    </script>
